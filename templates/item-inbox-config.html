<form class="item-inbox-config-form">
  <div class="form-group">
    <label class="checkbox inbox-toggle-label">
      <input type="checkbox" class="inbox-toggle" {{#if isInbox}}checked{{/if}}>
      <span>This item is an inbox</span>
    </label>
    <p class="notes">Configure this item to store and display messages.</p>
  </div>
  
  <div class="inbox-options" {{#unless isInbox}}style="display: none;"{{/unless}}>
    <!-- Inbox Type -->
    <div class="form-group inbox-type">
      <label>Inbox Type</label>
      <div class="inbox-type-options">
        <label class="radio">
          <input type="radio" name="inbox-type" value="single" {{#if (eq inboxType "single")}}checked{{/if}}>
          <span>Single Message</span>
          <p class="notes">Store only one message, replacing any existing message.</p>
        </label>
        <label class="radio">
          <input type="radio" name="inbox-type" value="multi" {{#if (eq inboxType "multi")}}checked{{/if}}>
          <span>Multi-Message Inbox</span>
          <p class="notes">Store multiple messages, similar to a regular inbox.</p>
        </label>
      </div>
    </div>
    
    <!-- Encryption Option -->
    <div class="form-group">
      <label class="checkbox encrypted-toggle-label">
        <input type="checkbox" class="encrypted-toggle" {{#if encrypted}}checked{{/if}}>
        <span>Encrypted</span>
      </label>
      <p class="notes">Require a skill check to decrypt message contents.</p>
    </div>
    
    <!-- Encryption Options -->
    <div class="encryption-options" {{#unless encrypted}}style="display: none;"{{/unless}}>
      <!-- Skill Check -->
      <div class="form-group">
        <label>Required Skill Check</label>
        <select name="skill-check">
          {{#select skillCheck}}
            {{#each skills as |label value|}}
              <option value="{{value}}">{{label}}</option>
            {{/each}}
          {{/select}}
        </select>
      </div>
      
      <!-- DV Value -->
      <div class="form-group">
        <label>Difficulty Value (DV)</label>
        <div class="form-fields">
          <input type="range" name="dv-value-range" value="{{dvValue}}" min="5" max="30" step="1">
          <span class="range-value">{{dvValue}}</span>
          <input type="number" name="dv-value" value="{{dvValue}}" min="5" max="30" placeholder="15">
        </div>
        <p class="notes">Higher values require higher skill levels to decrypt.</p>
      </div>
      
      <!-- Failure Outcome -->
      <div class="form-group">
        <label>Failure Outcome</label>
        <select name="failure-outcome">
          {{#select failureOutcome}}
            {{#each failureOutcomes as |label value|}}
              <option value="{{value}}">{{label}}</option>
            {{/each}}
          {{/select}}
        </select>
        <p class="notes">What happens when decryption fails.</p>
      </div>
    </div>
    
    <!-- Visual Theme -->
    <div class="form-group">
      <label>Interface Theme</label>
      <select name="theme">
        {{#select theme}}
          {{#each themes as |label value|}}
            <option value="{{value}}">{{label}}</option>
          {{/each}}
        {{/select}}
      </select>
      <p class="notes">Visual style for the inbox interface.</p>
    </div>
  </div>
  
  <!-- Action Buttons -->
  <div class="form-footer">
    <button type="button" class="cancel-config">
      <i class="fas fa-times"></i> Cancel
    </button>
    <button type="button" class="save-config">
      <i class="fas fa-save"></i> Save Configuration
    </button>
  </div>
</form>
