<div class="message-container">
  <div class="message-scroll-area">
    <div class="message-header">
      <p class="message-subject">
        <strong>{{subject}}</strong>
      </p>
      <div class="email-header">
        <p><strong>From:</strong> 
          <span>{{from}}</span>
        </p>
        <p><strong>To:</strong> 
          <span>{{to}}</span>
        </p>
        <p><strong>Date:</strong> 
          <span>{{date}}</span>
        </p>
      </div>
    </div>
    <div>
      {{{messageContent}}}
    </div>
  </div>
  
  <div class="message-footer">
    <div class="message-actions">
      <button class="action-btn export-btn" title="Export to Inbox">
        <i class="fas fa-download"></i> Export to Inbox
      </button>
      <button class="action-btn reply-btn" title="Reply">
        <i class="fas fa-reply"></i> Reply
      </button>
    </div>
  </div>
</div>
